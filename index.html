<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de gestión</title>
    <!-- ERP interno: no indexar en buscadores (sitio público: santamarialunahuana.com) -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-snippet:0, max-image-preview:none" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="description" content="Acceso restringido. Uso interno." />
    <meta name="theme-color" content="#3F4536" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍷</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
      /* Shell visible antes de JS — evita pestaña en blanco en cold start */
      html, body { margin: 0; min-height: 100%; background: #3F4536; }
      #root:empty, .boot-shell {
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: system-ui, Segoe UI, sans-serif; color: #f5f5f0; letter-spacing: 0.04em;
      }
      .boot-shell { flex-direction: column; gap: 0.75rem; text-align: center; padding: 1.5rem; }
      .boot-shell strong { font-size: 1.15rem; font-weight: 700; }
      .boot-shell span { opacity: 0.75; font-size: 0.85rem; }
      .boot-error {
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #2a2f24, #3F4536 50%, #5e664f); padding: 1.5rem;
        font-family: system-ui, Segoe UI, sans-serif;
      }
      .boot-error-card {
        background: #fff; color: #1f2937; border-radius: 16px; padding: 2rem; max-width: 420px;
        width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,.25); text-align: center;
      }
      .boot-error-card h1 { font-size: 1.15rem; margin: 0 0 0.75rem; }
      .boot-error-card p { color: #64748b; font-size: 0.9rem; line-height: 1.45; margin: 0 0 1.25rem; }
      .boot-error-card .btn { display: inline-flex; align-items: center; justify-content: center;
        padding: 0.7rem 1.2rem; border: 0; border-radius: 10px; background: #3F4536; color: #fff;
        font-weight: 600; cursor: pointer; width: 100%; }
    </style>
  </head>
  <body>
    <noscript>
      <div class="boot-shell">
        <strong>SANTA MARÍA</strong>
        <span>Active JavaScript para usar el panel de gestión.</span>
      </div>
    </noscript>
    <div id="root">
      <div class="boot-shell" role="status" aria-live="polite">
        <strong>SANTA MARÍA</strong>
        <span>Cargando panel…</span>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
